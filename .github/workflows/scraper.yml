name: Daily Lead Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 10:00 UAE time daily
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # allow the "Record last run" step to git push back to the repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node src/index.js

      - name: Record last run (keeps repo active so GitHub doesn't disable this schedule)
        working-directory: .
        run: |
          mkdir -p .github
          echo "Last successful run: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > .github/last-scraper-run.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-scraper-run.md
          git diff --cached --quiet || git commit -m "chore: record scraper run [skip ci]"
          git push
